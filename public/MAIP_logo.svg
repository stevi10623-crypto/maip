<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 668 190" width="668" height="190" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0d89a"/>
      <stop offset="0.45" stop-color="#d9b25e"/>
      <stop offset="1" stop-color="#a9802f"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4e3b0"/>
      <stop offset="0.5" stop-color="#e0bd6e"/>
      <stop offset="1" stop-color="#b88a35"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ICON: scales of justice + neural mesh -->
  <g transform="translate(14,14)" fill="none" stroke="url(#gold)" stroke-width="7"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- finial -->
    <path d="M90,6 L99,18 L90,30 L81,18 Z" fill="url(#gold)" stroke-width="2"/>
    <!-- central post -->
    <line x1="90" y1="30" x2="90" y2="132"/>
    <!-- beam -->
    <path d="M30,46 Q90,27 150,46"/>
    <!-- left pan -->
    <path d="M2,92 Q30,126 58,92" stroke-width="6"/>
    <path d="M30,46 L2,92 M30,46 L30,95 M30,46 L58,92" stroke-width="2.4"/>
    <!-- right pan -->
    <path d="M122,92 Q150,126 178,92" stroke-width="6"/>
    <path d="M150,46 L122,92 M150,46 L150,95 M150,46 L178,92" stroke-width="2.4"/>
    <!-- base -->
    <path d="M82,132 L98,132 L108,154 L72,154 Z" fill="url(#gold)" stroke-width="2"/>
    <rect x="62" y="153" width="56" height="11" rx="5" fill="url(#gold)" stroke="none"/>

    <!-- neural mesh -->
    <g stroke="#f0d89a" stroke-width="1.5" opacity="0.85">
      <path d="M30,46 L60,64 M60,64 L90,40 M90,40 L120,64 M120,64 L150,46
               M60,64 L90,76 M120,64 L90,76 M90,40 L90,76
               M90,76 L74,92 M90,76 L106,92 M60,64 L74,92 M120,64 L106,92"/>
    </g>
    <g fill="#f6e6b4" filter="url(#glow)" stroke="none">
      <circle cx="30" cy="46" r="3.4"/><circle cx="150" cy="46" r="3.4"/>
      <circle cx="90" cy="40" r="3.8"/><circle cx="60" cy="64" r="3.2"/>
      <circle cx="120" cy="64" r="3.2"/><circle cx="90" cy="76" r="3.6"/>
      <circle cx="74" cy="92" r="3"/><circle cx="106" cy="92" r="3"/>
    </g>
  </g>

  <!-- WORDMARK -->
  <text x="210" y="104" font-size="92" font-weight="700" letter-spacing="1"
        fill="url(#goldText)">MAIP</text>
  <text x="215" y="139" font-size="20.5" letter-spacing="4.1" font-weight="600"
        font-family="'Hanken Grotesk', Arial, sans-serif" fill="#c9bca6">MASTER AI PRACTITIONER</text>
</svg>
